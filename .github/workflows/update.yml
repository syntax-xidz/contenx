            fi
          fi
          base64 -w 0 new.json > silent4.json
          rm -f new.json current.json temp_silent.json
          echo "SHOULD_UPDATE_SILENT4=$SHOULD_UPDATE_SILENT4" >> $GITHUB_ENV
        
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          COMMIT_NEEDED=false
          [ "$SHOULD_UPDATE" = "true" ] && git add silent.json && COMMIT_NEEDED=true
          [ "$SHOULD_UPDATE_SILENT1" = "true" ] && git add silent1.json && COMMIT_NEEDED=true
          [ "$SHOULD_UPDATE_SILENT2" = "true" ] && git add silent2.json && COMMIT_NEEDED=true
          [ "$SHOULD_UPDATE_SILENT3" = "true" ] && git add silent3.json && COMMIT_NEEDED=true
          [ "$SHOULD_UPDATE_SILENT4" = "true" ] && git add silent4.json && COMMIT_NEEDED=true
          if [ "$COMMIT_NEEDED" = "true" ]; then
            if ! git diff --staged --quiet; then
              git commit -m "Update data firmware - $(date -u '+%Y-%m-%d %H:%M UTC')"
              git push
            fi
          fi

      - if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.SECRET_KEY }}
        run: |
          curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=50&status=completed" | jq -r '.workflow_runs[2:] | .[].id' | head -10 | while read run_id; do
            [ ! -z "$run_id" ] && curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id" >/dev/null 2>&1
          done