<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting..</title>
    <script>
        const status = 'disable';
        const p = window.location.pathname;
        
        if (status === 'disable' && (/^\/(home|login|dashboard)/i.test(p) || p === '/' || p === '/index.html')) {
            window.location.replace('/2026');
        } else if (status === 'enable' && (p === '/' || p === '/index.html')) {
            window.location.replace('/login');
        }
    </script>
</head>
<body>
</body>
</html>
